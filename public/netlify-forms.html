<!DOCTYPE html>
<html lang="en">
  <head><meta charset="utf-8" /><title>Netlify Forms</title></head>
  <body>
    <!-- contact form -->
    <form name="contact" netlify data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input name="bot-field" type="hidden" />
      <input name="name" type="text" />
      <input name="email" type="email" />
      <input name="subject" type="text" />
      <textarea name="message"></textarea>
    </form>
    <!-- waitlist form -->
    <form name="waitlist" netlify data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input name="bot-field" type="hidden" />
      <input name="email" type="email" />
    </form>
    <!-- plan usage tracking (fires when a plan is generated) -->
    <form name="plan_usage" netlify data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input name="bot-field" type="hidden" />
      <input name="name" type="text" />
      <input name="sport" type="text" />
      <input name="plan_type" type="text" />
      <input name="effort" type="text" />
      <input name="duration_minutes" type="number" />
      <input name="carb_target_g_per_hr" type="number" />
      <input name="access_code" type="text" />
    </form>
    <!-- member signup (fires after access code, email registration step) -->
    <form name="member_signup" netlify data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input name="bot-field" type="hidden" />
      <input name="email" type="email" />
      <input name="access_code" type="text" />
    </form>
    <!-- save plan with email -->
    <form name="save_plan" netlify data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input name="bot-field" type="hidden" />
      <input name="email" type="email" />
      <input name="name" type="text" />
      <input name="sport" type="text" />
      <input name="plan_type" type="text" />
      <input name="effort" type="text" />
      <input name="duration" type="text" />
      <input name="carb_target_g_per_hr" type="number" />
      <input name="total_carbs_g" type="number" />
      <input name="fluid_ml_per_hr" type="number" />
      <input name="sodium_mg_per_hr" type="number" />
    </form>
  </body>
</html>
